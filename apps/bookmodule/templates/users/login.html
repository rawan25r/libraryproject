<h2>Login</h2>
{% for msg in messages %}
<p>{{ msg }}</p>
{% endfor %}

<form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username"><br>
    <input type="password" name="password" placeholder="Password"><br>
    <button type="submit">Login</button>
</form>

{% for msg in messages %}
<p>{{ msg }}</p>
{% endfor %}
