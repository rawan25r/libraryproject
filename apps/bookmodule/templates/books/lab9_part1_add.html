{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'main.css' %}">
    <style>
        body { padding: 20px; font-family: Arial; }
        h2 {
            width: 100%;
            background-color: #89ecd5;
            padding: 15px;
            border-radius: 5px;
        }
        form { margin-top: 20px; }
        input {
            width: 300px;
            padding: 8px;
            margin-bottom: 12px;
        }
        button {
            padding: 8px 16px;
            background-color: #89ecd5;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>

<body>

<h2>Add New Book</h2>

<form method="POST">
    {% csrf_token %}

    <label>Title:</label><br>
    <input type="text" name="title"><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price"><br>

    <label>Quantity:</label><br>
    <input type="number" name="quantity"><br>

    <label>Publish Date:</label><br>
    <input type="datetime-local" name="pubdate"><br>

    <label>Rating:</label><br>
    <input type="number" name="rating" min="1" max="5"><br>

    <button type="submit">Save</button>
    <a class="btn" href="/books/lab9_part1/editbook/{{ b.id }}/">Edit</a>
<a class="btn" href="/books/lab9_part1/deletebook/{{ b.id }}/">Delete</a>

</form>

</body>
</html>
