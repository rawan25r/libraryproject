{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'main.css' %}">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            color: black;
        }

        h2 {
            width: 100%;
            background-color: #89ecd5;
            color: black;
            padding: 15px 20px;
            text-align: left;
            font-size: 1.3em;
            margin: 0 0 20px 0;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #e8f9f4;
        }

        a.btn {
            padding: 6px 12px;
            background-color: #89ecd5;
            color: black;
            text-decoration: none;
            border-radius: 4px;
        }

        a.btn:hover {
            background-color: #6bd8c0;
        }
    </style>
</head>

<body>

<h2>📚 Books List</h2>

<a href="/books/lab9_part1/addbook/" class="btn">+ Add New Book</a>

<table>
    <tr>
        <th>Title</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Pub Date</th>
        <th>Rating</th>
        <th>Actions</th>
    </tr>

    {% for b in books %}
    <tr>
        <td>{{ b.title }}</td>
        <td>{{ b.price }}</td>
        <td>{{ b.quantity }}</td>
        <td>{{ b.pubdate }}</td>
        <td>{{ b.rating }}</td>
        <td>
            <a class="btn" href="/books/lab9_part1/editbook/{{ b.id }}/">Edit</a>
            <a class="btn" href="/books/lab9_part1/deletebook/{{ b.id }}/">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
<p><a href="/users/logout/">Logout</a></p>

</body>
</html>
