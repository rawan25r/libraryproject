{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'main.css' %}">
    <style>
        body { padding: 20px; font-family: Arial; }
        h2 {
            width: 100%;
            background-color: #89ecd5;
            padding: 15px;
            border-radius: 5px;
        }
        input {
            width: 300px;
            padding: 8px;
            margin-bottom: 12px;
        }
        button {
            padding: 8px 16px;
            background-color: #89ecd5;
            border: none;
            border-radius: 4px;
        }
        .logout {
            float: right;
            margin-top: -40px;
        }
    </style>
</head>

<body>

<!-- زر تسجيل الخروج -->
<a href="/users/logout" class="logout">Logout</a>

<h2>Edit Book</h2>

<!-- رسائل Django -->
{% for msg in messages %}
<p>{{ msg }}</p>
{% endfor %}

<form method="POST">
    {% csrf_token %}

    <label>Title:</label><br>
    <input type="text" name="title" value="{{ book.title }}"><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price" value="{{ book.price }}"><br>

    <label>Quantity:</label><br>
    <input type="number" name="quantity" value="{{ book.quantity }}"><br>

    <label>Publish Date:</label><br>
    <input type="datetime-local" name="pubdate" value="{{ book.pubdate|date:'Y-m-d\\TH:i' }}"><br>

    <label>Rating:</label><br>
    <input type="number" name="rating" min="1" max="5" value="{{ book.rating }}"><br>

    <button type="submit">Update</button>
</form>

</body>
</html>
