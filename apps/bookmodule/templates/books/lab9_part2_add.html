{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'main.css' %}">
    <style>
        body { padding: 20px; font-family: Arial; }
        h2 {
            width: 100%;
            background-color: #89ecd5;
            padding: 15px;
            border-radius: 5px;
        }
        form { margin-top: 20px; }
        input, select {
            width: 300px;
            padding: 8px;
            margin-bottom: 12px;
        }
        button {
            padding: 8px 16px;
            background-color: #89ecd5;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>

<body>

<h2>Add Book (Django Form)</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Save</button>
</form>

</body>
</html>
