<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>List of Books</title>

    <meta name="keywords" content="Books, recent, Learning, library">
    <meta name="description" content="Books website">
    <meta name="author" content="author name">

    <link rel="icon" href="qu-icon.png">

    <style>
        h1 { color: green; }
        h2 { color: lightskyblue; }
        p {
            font-family: verdana;
            font-size: 20px;
        }
    </style>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="topnav">
    <a href="index.html">Home</a>
    <a class="active" href="list_books.html">List Books</a>
    <a href="aboutus.html">About</a>
</div>

<h1>List of Books</h1>

<!-- ============================= -->
<!-- هنا أضفت فقط كود Django Loop -->
<!-- ============================= -->

{% for book in books %}

<a href="one_book.html">
    <h2>{{ forloop.counter }}) {{ book.title }}</h2>
</a>

<a href="one_book.html">
    {% if book.image %}
        <img src="{{ book.image.url }}" width="200" height="200" alt="Book1 img">
    {% else %}
        <img src="book1.jpg" width="200" height="200" alt="Book1 img">
    {% endif %}
</a>

<hr>

{% endfor %}

<!-- زر إضافة كتاب -->
<a href="/books/add/">
    <button>Add New Book</button>
</a>

</body>
</html>
