<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>List of Books</title>

    <style>
        h1 { color: green; }
        h2 { color: lightskyblue; }
        p {
            font-family: verdana;
            font-size: 20px;
        }
        .topnav {
            background-color: #333;
            overflow: hidden;
        }
        .topnav a {
            float: left;
            color: #f2f2f2;
            padding: 14px 16px;
            text-decoration: none;
        }
        .topnav a.active {
            background-color: #04AA6D;
            color: white;
        }
        

        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }

    </style>
</head>

<body>

<div class="topnav">
    <a href="/">Home</a>
    <a class="active" href="/bookmodule/lab9_part1/listbooks/">List Books</a>
    <a href="/about/">About</a>

    <!-- زر تسجيل الخروج -->
    <a href="/users/logout/" style="float:right;">Logout</a>
</div>

<h1>List of Books</h1>

{% for book in books %}
    <h2>{{ forloop.counter }}) {{ book.title }}</h2>

    {% if book.image %}
        <img src="{{ book.image.url }}" width="200" height="200">
    {% endif %}

    <hr>
{% endfor %}

<a href="/books/lab9_part2/addbook/">
    <button>Add New Book</button>
</a>
<p><a href="/users/logout/">Logout</a></p>

</body>
</html>
